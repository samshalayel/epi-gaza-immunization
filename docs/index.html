<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EPI Gaza</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background:#1FA2C8">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">
      <i class="bi bi-heart-pulse-fill me-2"></i><span id="nav-title"></span>
    </span>
    <div class="ms-auto d-flex gap-2 align-items-center">
      <button class="btn btn-warning btn-sm fw-bold" id="langBtn" onclick="toggleLang()"></button>
      <button class="btn btn-light btn-sm" onclick="showAddModal()">
        <i class="bi bi-plus-circle"></i> <span id="nav-add"></span>
      </button>
      <button class="btn btn-outline-light btn-sm" onclick="exportAll()">
        <i class="bi bi-file-earmark-excel"></i> <span id="nav-export"></span>
      </button>
    </div>
  </div>
</nav>

<div class="container-fluid py-3">
  <div class="row mb-3 align-items-end g-2">
    <div class="col-md-3">
      <h5 class="mb-0"><i class="bi bi-hospital"></i> <span id="lbl-facilities"></span></h5>
      <small class="text-muted" id="facilityCount"></small>
    </div>
    <div class="col-auto">
      <label class="form-label fw-bold mb-1" id="lbl-year"></label>
      <select id="yearSel" class="form-select form-select-sm" onchange="renderList()">
        <script>for(let y=2020;y<=2032;y++) document.write(`<option value="${y}"${y===2025?' selected':''}>${y}</option>`);</script>
      </select>
    </div>
    <div class="col-auto">
      <label class="form-label fw-bold mb-1" id="lbl-gov"></label>
      <select id="govSel" class="form-select form-select-sm" onchange="renderList()">
        <option value="" id="opt-allgov"></option>
      </select>
    </div>
    <div class="col">
      <label class="form-label fw-bold mb-1" id="lbl-search"></label>
      <input type="text" id="searchInput" class="form-control form-control-sm" oninput="renderList()">
    </div>
    <div class="col-auto pt-3">
      <button class="btn btn-outline-secondary btn-sm" id="btn-clear"
              onclick="document.getElementById('searchInput').value='';renderList()"></button>
    </div>
  </div>

  <div id="listContainer"></div>
</div>

<!-- Add Facility Modal -->
<div class="modal fade" id="addModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header" style="background:#1FA2C8;color:#fff">
        <h5 class="modal-title" id="modal-title"></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-2">
          <label class="form-label fw-bold" id="lbl-fname"></label>
          <input type="text" id="newName" class="form-control" id="inp-fname">
        </div>
        <div class="mb-2">
          <label class="form-label fw-bold" id="lbl-fgov"></label>
          <select id="newGov" class="form-select">
            <option value="North Gaza">North Gaza</option>
            <option value="Gaza City">Gaza City</option>
            <option value="Dier Elbalah">Dier Elbalah</option>
            <option value="KhanYounis">KhanYounis</option>
            <option value="Rafah">Rafah</option>
          </select>
        </div>
        <div class="mb-2">
          <label class="form-label fw-bold" id="lbl-ftype"></label>
          <select id="newType" class="form-select">
            <option value="PHC">PHC</option>
            <option value="Medical Point">Medical Point</option>
            <option value="Hospital">Hospital</option>
          </select>
        </div>
        <div class="mb-2">
          <label class="form-label fw-bold" id="lbl-fprov"></label>
          <select id="newProvider" class="form-select">
            <option value="MOH">MOH</option>
            <option value="UNRWA">UNRWA</option>
            <option value="PRCS">PRCS</option>
            <option value="IMC">IMC</option>
            <option value="MSF">MSF</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="addFacility()"><i class="bi bi-save"></i> <span id="btn-save"></span></button>
        <button class="btn btn-secondary" data-bs-dismiss="modal" id="btn-cancel"></button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="js/data.js"></script>
<script src="js/i18n.js"></script>
<script src="js/export.js"></script>
<script>
let facilities = [];

function applyTranslations() {
  applyDir();
  document.getElementById('nav-title').textContent      = t('appTitle');
  document.getElementById('nav-add').textContent        = t('addFacility');
  document.getElementById('nav-export').textContent     = t('exportAll');
  document.getElementById('langBtn').textContent        = t('langBtn');
  document.getElementById('lbl-facilities').textContent = t('facilities');
  document.getElementById('lbl-year').textContent       = t('year');
  document.getElementById('lbl-gov').textContent        = t('governorate');
  document.getElementById('opt-allgov').textContent     = t('allGov');
  document.getElementById('lbl-search').textContent     = t('search');
  document.getElementById('searchInput').placeholder    = t('searchPlaceholder');
  document.getElementById('btn-clear').textContent      = t('clear');
  document.getElementById('modal-title').textContent    = t('addModalTitle');
  document.getElementById('lbl-fname').textContent      = t('nameLabel');
  document.getElementById('newName').placeholder        = t('namePlaceholder');
  document.getElementById('lbl-fgov').textContent       = t('govLabel');
  document.getElementById('lbl-ftype').textContent      = t('typeLabel');
  document.getElementById('lbl-fprov').textContent      = t('providerLabel');
  document.getElementById('btn-save').textContent       = t('save');
  document.getElementById('btn-cancel').textContent     = t('cancel');
  document.title = t('appTitle');
}

function toggleLang() {
  setLang(getLang() === 'ar' ? 'en' : 'ar');
  applyTranslations();
  renderList();
}

async function loadFacilities() {
  const stored = localStorage.getItem('facilities');
  if (stored) {
    facilities = JSON.parse(stored);
  } else {
    const res = await fetch('data/facilities.json');
    facilities = await res.json();
    localStorage.setItem('facilities', JSON.stringify(facilities));
  }
  const govs = [...new Set(facilities.map(f => f.governorate))].sort();
  const sel = document.getElementById('govSel');
  // Remove old options except first
  while (sel.options.length > 1) sel.remove(1);
  govs.forEach(g => sel.innerHTML += `<option value="${g}">${g}</option>`);
  applyTranslations();
  renderList();
}

function renderList() {
  const year = document.getElementById('yearSel').value;
  const gov  = document.getElementById('govSel').value;
  const srch = document.getElementById('searchInput').value.toLowerCase();

  const filtered = facilities.filter(f =>
    (!gov  || f.governorate === gov) &&
    (!srch || f.name.toLowerCase().includes(srch))
  );

  document.getElementById('facilityCount').textContent = `${filtered.length} ${t('facilities')}`;

  const groups = {};
  filtered.forEach(f => {
    if (!groups[f.governorate]) groups[f.governorate] = [];
    groups[f.governorate].push(f);
  });

  let html = '';
  for (const [g, facs] of Object.entries(groups)) {
    html += `<div class="card mb-3 shadow-sm">
      <div class="card-header gov-header">
        <i class="bi bi-geo-alt-fill"></i> ${g}
        <span class="badge bg-light text-dark ms-2">${facs.length}</span>
      </div>
      <div class="table-responsive">
        <table class="table table-hover table-sm mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>${t('facilityName')}</th>
              <th>${t('type')}</th>
              <th>${t('provider')}</th>
              <th>${t('status')}</th>
              <th>${t('action')}</th>
            </tr>
          </thead><tbody>`;
    facs.forEach(f => {
      const hasData = !!localStorage.getItem(`data_${f.id}_${year}`);
      html += `<tr>
        <td class="text-muted">${f.id}</td>
        <td class="fw-semibold">${f.name}</td>
        <td><span class="badge bg-info text-dark">${f.type}</span></td>
        <td>${f.provider}</td>
        <td>
          <span class="badge bg-success">${t('functional')}</span>
          ${hasData ? `<span class="badge bg-primary ms-1">${t('hasData')}</span>` : ''}
        </td>
        <td>
          <a href="facility.html?id=${f.id}&year=${year}" class="btn btn-primary btn-xs">
            <i class="bi bi-pencil-square"></i> ${t('enterData')}
          </a>
          <button onclick="exportFacility(${f.id},'${year}')" class="btn btn-success btn-xs">
            <i class="bi bi-file-earmark-excel"></i> Excel
          </button>
        </td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
  }
  if (!html) html = `<div class="alert alert-warning">${t('noResults')}</div>`;
  document.getElementById('listContainer').innerHTML = html;
}

function showAddModal() {
  new bootstrap.Modal(document.getElementById('addModal')).show();
}

function addFacility() {
  const name = document.getElementById('newName').value.trim();
  if (!name) return alert(t('nameLabel'));
  const maxId = Math.max(...facilities.map(f => f.id), 100);
  facilities.push({
    id: maxId + 1,
    governorate: document.getElementById('newGov').value,
    name,
    type: document.getElementById('newType').value,
    provider: document.getElementById('newProvider').value,
    status: 'Functional'
  });
  localStorage.setItem('facilities', JSON.stringify(facilities));
  bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
  renderList();
}

function exportAll() {
  exportAllFacilities(facilities, document.getElementById('yearSel').value);
}

function exportFacility(id, year) {
  const fac = facilities.find(f => f.id === id);
  if (fac) exportSingleFacility(fac, year);
}

loadFacilities();
</script>
</body>
</html>
