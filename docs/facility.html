<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EPI Gaza</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
<nav class="navbar navbar-dark" style="background:#1FA2C8">
  <div class="container-fluid">
    <a href="index.html" class="btn btn-outline-light btn-sm me-2" id="nav-back"></a>
    <span class="navbar-brand mb-0 fw-bold" id="navTitle"></span>
    <div class="ms-auto d-flex gap-2">
      <button class="btn btn-warning btn-sm fw-bold" id="langBtn" onclick="toggleLang()"></button>
      <button class="btn btn-success btn-sm" onclick="exportCurrent()">
        <i class="bi bi-file-earmark-excel"></i> <span id="nav-export"></span>
      </button>
      <button class="btn btn-outline-light btn-sm" onclick="window.print()">
        <i class="bi bi-printer-fill"></i> <span id="nav-print"></span>
      </button>
      <button class="btn btn-light btn-sm" onclick="saveData()">
        <i class="bi bi-save2-fill"></i> <span id="nav-save"></span>
      </button>
    </div>
  </div>
</nav>

<div class="container-fluid py-3" id="pageContent">
  <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
</div>

<div id="savedToast" class="position-fixed bottom-0 start-50 translate-middle-x mb-3" style="z-index:9999;display:none">
  <div class="alert alert-success shadow py-2 px-4 mb-0">
    <i class="bi bi-check-circle-fill"></i> <span id="toast-msg"></span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="js/data.js"></script>
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/export.js"></script>
<script>
const PARAMS  = new URLSearchParams(location.search);
const FAC_ID  = parseInt(PARAMS.get('id'));
let YEAR      = parseInt(PARAMS.get('year')) || 2025;
let facility  = null;
let currentData = {};

function applyNavTranslations() {
  applyDir();
  document.getElementById('nav-back').innerHTML    = `<i class="bi bi-arrow-${getLang()==='ar'?'right':'left'}"></i> ${t('back')}`;
  document.getElementById('nav-export').textContent = t('exportExcel');
  document.getElementById('nav-print').textContent  = t('printPDF');
  document.getElementById('nav-save').textContent   = t('saveData');
  document.getElementById('langBtn').textContent    = t('langBtn');
  document.getElementById('toast-msg').textContent  = t('savedMsg');
}

function toggleLang() {
  setLang(getLang() === 'ar' ? 'en' : 'ar');
  renderPage();
}

async function init() {
  applyDir();
  try {
    const facilities = await api.getFacilities();
    facility = facilities.find(f => f.id === FAC_ID);
    if (!facility) {
      document.getElementById('pageContent').innerHTML = '<div class="alert alert-danger">Facility not found</div>';
      return;
    }
    document.title = facility.name;
    const d = await api.getData(FAC_ID, YEAR);
    // Flatten API response: monthly_data + catchment_pop + si_percent
    currentData = { ...(d.monthly_data || {}), catchment_pop: d.catchment_pop || 0, si_percent: d.si_percent != null ? d.si_percent : 3.2 };
    renderPage();
  } catch(e) {
    document.getElementById('pageContent').innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
  }
}

function renderPage() {
  applyNavTranslations();
  document.getElementById('navTitle').textContent = facility.name;

  const catchment = currentData.catchment_pop || 0;
  const si        = currentData.si_percent != null ? currentData.si_percent : 3.2;
  const target    = Math.round(catchment * si / 100);

  let html = `
  <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
    <div>
      <h5 class="mb-0"><i class="bi bi-hospital-fill text-primary"></i> ${facility.name}</h5>
      <small class="text-muted">${facility.governorate} | ${facility.type} | ${facility.provider}</small>
    </div>
  </div>

  <div class="card mb-3 shadow-sm">
    <div class="card-header section-header">
      <i class="bi bi-people-fill"></i> ${t('yearAndTarget')}
    </div>
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-6 col-md-2">
          <label class="form-label fw-bold">${t('year')}</label>
          <select id="yearSel" class="form-select" onchange="changeYear(this.value)">
            ${Array.from({length:13},(_,i)=>2020+i).map(y=>`<option value="${y}"${y===YEAR?' selected':''}>${y}</option>`).join('')}
          </select>
        </div>
        <div class="col-6 col-md-3">
          <label class="form-label fw-bold">${t('catchmentLabel')}</label>
          <input type="number" id="catchPop" class="form-control" value="${catchment}" min="0" oninput="recalcTarget()">
        </div>
        <div class="col-6 col-md-2">
          <label class="form-label fw-bold">${t('siLabel')}</label>
          <input type="number" id="siPct" class="form-control" value="${si}" step="0.1" min="0" max="100" oninput="recalcTarget()">
        </div>
        <div class="col-6 col-md-2">
          <label class="form-label fw-bold">${t('targetLabel')}</label>
          <div class="form-control bg-light fw-bold text-primary" id="targetDisp">${target.toLocaleString()}</div>
        </div>
        <div class="col-md-3">
          <button class="btn btn-primary w-100" onclick="saveData()">
            <i class="bi bi-save2-fill"></i> ${t('saveAll')}
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm mb-3">
    <div class="card-header section-header d-flex justify-content-between align-items-center">
      <span><i class="bi bi-table"></i> ${t('monthlyTitle')}</span>
      <small class="text-white opacity-75">${t('monthlyHint')}</small>
    </div>
    <div class="table-responsive">
      <table class="table table-bordered table-sm mb-0 monthly-table" id="mainTable">
        <thead>
          <tr class="table-header-row">
            <th rowspan="2" class="antigen-col">${t('antigen')}</th>
            ${MONTHS.map(m=>`<th colspan="2" class="text-center month-header">${m}</th>`).join('')}
            <th rowspan="2" class="text-center annual-col">${t('annual')}</th>
            <th rowspan="2" class="text-center cov-col">${t('coverage')}</th>
          </tr>
          <tr class="table-subheader-row">
            ${MONTHS.map(()=>`<th class="text-center subh">${t('monthly')}</th><th class="text-center subh">${t('cumul')}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${ANTIGENS.map((ag,i) => {
            const rowCls = i%2===0?'row-blue':'row-yellow';
            let cells = '';
            for(let m=1;m<=12;m++){
              const v = currentData[`${ag.key}_${m}`]||0;
              cells += `<td><input type="number" class="form-control form-control-sm monthly-input text-center p-1"
                data-ag="${ag.key}" data-m="${m}" value="${v}" min="0" oninput="recalcAll()"></td>
                <td class="cum-cell text-center fw-semibold" id="cum_${ag.key}_${m}">0</td>`;
            }
            return `<tr class="${rowCls}" data-ag="${ag.key}">
              <td class="antigen-label fw-semibold">${ag.label}</td>
              ${cells}
              <td class="text-center fw-bold annual-cell" id="ann_${ag.key}">0</td>
              <td class="text-center cov-cell" id="cov_${ag.key}">–</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>

  <div class="card shadow-sm mb-3">
    <div class="card-header section-header">
      <i class="bi bi-graph-down-arrow"></i> ${t('dropoutTitle')}
      <small class="text-white opacity-75 me-3">${t('dropoutFormula')}</small>
    </div>
    <div class="table-responsive">
      <table class="table table-bordered table-sm mb-0">
        <thead>
          <tr class="table-header-row">
            <th class="antigen-col">${t('antigen')}</th>
            ${MONTHS.map(m=>`<th class="text-center">${m}</th>`).join('')}
            <th class="text-center">${t('annual')}</th>
            <th class="text-center">${t('assessment')}</th>
          </tr>
        </thead>
        <tbody id="dropoutBody">
          ${DROPOUTS.map((d,i)=>`
          <tr class="${i%2===0?'row-blue':'row-yellow'}" data-num="${d.num}" data-den="${d.den}">
            <td class="antigen-label fw-semibold">${d.label}</td>
            ${MONTHS.map((_,mi)=>`<td class="text-center" id="do_${i}_${mi+1}">–</td>`).join('')}
            <td class="text-center fw-bold" id="do_ann_${i}">–</td>
            <td class="text-center" id="do_st_${i}">–</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-header section-header"><i class="bi bi-bar-chart-fill"></i> ${t('legendTitle')}</div>
    <div class="card-body d-flex gap-2 flex-wrap">
      <span class="legend-badge" style="background:#00B050;color:#fff">${t('leg100')}</span>
      <span class="legend-badge" style="background:#92D050">${t('leg75')}</span>
      <span class="legend-badge" style="background:#FFEB84">${t('leg50')}</span>
      <span class="legend-badge" style="background:#FF9900;color:#fff">${t('leg45')}</span>
      <span class="legend-badge" style="background:#FF0000;color:#fff">${t('leg0')}</span>
    </div>
  </div>

  <!-- ── Charts ── -->
  <div class="row g-3 mb-4">
    <div class="col-12 col-xl-6">
      <div class="card shadow-sm h-100">
        <div class="card-header section-header">
          <i class="bi bi-graph-up"></i> ${t('chart1Title')}
        </div>
        <div class="card-body" style="position:relative;height:320px">
          <canvas id="chartCumulative"></canvas>
        </div>
      </div>
    </div>
    <div class="col-12 col-xl-6">
      <div class="card shadow-sm h-100">
        <div class="card-header section-header">
          <i class="bi bi-percent"></i> ${t('chart2Title')}
        </div>
        <div class="card-body" style="position:relative;height:320px">
          <canvas id="chartCoverage"></canvas>
        </div>
      </div>
    </div>
  </div>`;

  document.getElementById('pageContent').innerHTML = html;
  recalcAll();
  // Charts need a tick after DOM paint to get correct canvas dimensions
  setTimeout(renderCharts, 50);
}

function recalcTarget() {
  const c = parseFloat(document.getElementById('catchPop').value)||0;
  const s = parseFloat(document.getElementById('siPct').value)||0;
  document.getElementById('targetDisp').textContent = Math.round(c*s/100).toLocaleString();
  recalcAll();
}

function getTarget() {
  const c = parseFloat(document.getElementById('catchPop').value)||0;
  const s = parseFloat(document.getElementById('siPct').value)||0;
  return Math.round(c*s/100);
}

function recalcAll() {
  const monthly={}, cumByMonth={}, annuals={};
  document.querySelectorAll('.monthly-input').forEach(inp => {
    const ag=inp.dataset.ag, m=parseInt(inp.dataset.m);
    if(!monthly[ag]) monthly[ag]={};
    monthly[ag][m]=parseInt(inp.value)||0;
  });
  const target=getTarget();
  ANTIGENS.forEach(ag=>{
    let cum=0; cumByMonth[ag.key]={};
    for(let m=1;m<=12;m++){
      cum+=(monthly[ag.key]&&monthly[ag.key][m])||0;
      cumByMonth[ag.key][m]=cum;
      const el=document.getElementById(`cum_${ag.key}_${m}`);
      if(el) el.textContent=cum.toLocaleString();
    }
    annuals[ag.key]=cum;
    const annEl=document.getElementById(`ann_${ag.key}`);
    if(annEl) annEl.textContent=cum.toLocaleString();
    const covEl=document.getElementById(`cov_${ag.key}`);
    if(covEl){
      if(target>0){const p=(cum/target*100).toFixed(1); covEl.textContent=p+'%'; covEl.className='text-center cov-cell '+covClass(parseFloat(p));}
      else covEl.textContent='–';
    }
  });
  DROPOUTS.forEach((d,i)=>{
    for(let m=1;m<=12;m++){
      const n=(cumByMonth[d.num]&&cumByMonth[d.num][m])||0;
      const dn=(cumByMonth[d.den]&&cumByMonth[d.den][m])||0;
      const el=document.getElementById(`do_${i}_${m}`);
      if(el){if(n>0){const p=((n-dn)/n*100).toFixed(1); el.textContent=p+'%'; el.className='text-center '+doClass(parseFloat(p));}else el.textContent='–';}
    }
    const nA=annuals[d.num]||0, dA=annuals[d.den]||0;
    const annEl=document.getElementById(`do_ann_${i}`), stEl=document.getElementById(`do_st_${i}`);
    if(annEl){
      if(nA>0){
        const p=((nA-dA)/nA*100).toFixed(1);
        annEl.textContent=p+'%'; annEl.className='text-center fw-bold '+doClass(parseFloat(p));
        if(stEl){stEl.textContent=parseFloat(p)>10?t('high'):t('ok'); stEl.className='text-center fw-bold '+(parseFloat(p)>10?'text-danger':'text-success');}
      } else {annEl.textContent='–'; if(stEl)stEl.textContent='–';}
    }
  });
  renderCharts();
}

function covClass(p){if(p>=100)return'cov-excellent';if(p>=75)return'cov-good';if(p>=50)return'cov-fair';if(p>=45)return'cov-weak';return'cov-critical';}
function doClass(p){return p>10?'text-danger':p>5?'text-warning':'text-success';}

// ── Charts ────────────────────────────────────────────────────────────────────
let chartCum = null, chartCov = null;

const CHART_ANTIGENS = [
  {key:'BCG',    label:'BCG',    color:'#1FA2C8'},
  {key:'Penta1', label:'Penta 1',color:'#E67E22'},
  {key:'Penta3', label:'Penta 3',color:'#8E44AD'},
  {key:'MR1',    label:'MR 1',   color:'#27AE60'},
  {key:'MR2',    label:'MR 2',   color:'#E74C3C'},
];

function renderCharts() {
  const canvasCum = document.getElementById('chartCumulative');
  const canvasCov = document.getElementById('chartCoverage');
  if (!canvasCum || !canvasCov) return;

  const target = getTarget();
  const labels = MONTHS;

  // Collect monthly inputs
  const monthly = {};
  document.querySelectorAll('.monthly-input').forEach(inp => {
    const ag = inp.dataset.ag, m = parseInt(inp.dataset.m);
    if (!monthly[ag]) monthly[ag] = {};
    monthly[ag][m] = parseInt(inp.value) || 0;
  });

  // Build cumulative series per antigen
  const cumSeries = CHART_ANTIGENS.map(ag => {
    let cum = 0;
    return MONTHS.map((_, i) => {
      cum += (monthly[ag.key] && monthly[ag.key][i+1]) || 0;
      return cum;
    });
  });

  // Target line: linear 0 → target over 12 months
  const targetLine = MONTHS.map((_, i) => Math.round(target * (i + 1) / 12));

  // Coverage % series (cumulative / target * 100)
  const covSeries = cumSeries.map(series =>
    series.map(v => target > 0 ? parseFloat((v / target * 100).toFixed(1)) : 0)
  );

  const isRTL = document.documentElement.dir === 'rtl';

  const commonOpts = {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 10 } },
      tooltip: { rtl: isRTL }
    },
    scales: {
      x: { ticks: { font: { size: 10 } }, grid: { color: '#eee' } },
    }
  };

  // ── Chart 1: Cumulative vs Target ──
  const cum_datasets = CHART_ANTIGENS.map((ag, i) => ({
    label: ag.label,
    data: cumSeries[i],
    borderColor: ag.color,
    backgroundColor: ag.color + '22',
    borderWidth: 2,
    pointRadius: 3,
    pointHoverRadius: 5,
    tension: 0.3,
    fill: false,
  }));

  if (target > 0) {
    cum_datasets.push({
      label: t('targetLine'),
      data: targetLine,
      borderColor: '#888',
      borderDash: [6, 4],
      borderWidth: 2,
      pointRadius: 0,
      tension: 0,
      fill: false,
    });
  }

  if (chartCum) chartCum.destroy();
  chartCum = new Chart(canvasCum, {
    type: 'line',
    data: { labels, datasets: cum_datasets },
    options: {
      ...commonOpts,
      scales: {
        ...commonOpts.scales,
        y: {
          beginAtZero: true,
          title: { display: true, text: t('chart1Y'), font: { size: 11 } },
          grid: { color: '#eee' }
        }
      }
    }
  });

  // ── Chart 2: Coverage % ──
  const cov_datasets = CHART_ANTIGENS.map((ag, i) => ({
    label: ag.label,
    data: covSeries[i],
    borderColor: ag.color,
    backgroundColor: ag.color + '22',
    borderWidth: 2,
    pointRadius: 3,
    pointHoverRadius: 5,
    tension: 0.3,
    fill: false,
  }));

  if (chartCov) chartCov.destroy();
  chartCov = new Chart(canvasCov, {
    type: 'line',
    data: { labels, datasets: cov_datasets },
    options: {
      ...commonOpts,
      scales: {
        ...commonOpts.scales,
        y: {
          beginAtZero: true,
          max: 120,
          title: { display: true, text: t('chart2Y'), font: { size: 11 } },
          grid: { color: '#eee' },
          ticks: {
            callback: v => v + '%',
            font: { size: 10 }
          }
        }
      },
      plugins: {
        ...commonOpts.plugins,
        annotation: undefined,
      }
    }
  });
}

async function saveData(){
  const monthly = {};
  document.querySelectorAll('.monthly-input').forEach(inp => {
    monthly[`${inp.dataset.ag}_${inp.dataset.m}`] = parseInt(inp.value) || 0;
  });
  const payload = {
    catchment_pop: parseFloat(document.getElementById('catchPop').value) || 0,
    si_percent:    parseFloat(document.getElementById('siPct').value)    || 3.2,
    monthly_data:  monthly,
  };
  try {
    await api.saveData(FAC_ID, YEAR, payload);
    currentData = { ...monthly, catchment_pop: payload.catchment_pop, si_percent: payload.si_percent };
    const toast = document.getElementById('savedToast');
    document.getElementById('toast-msg').textContent = t('savedMsg');
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2500);
  } catch(e) {
    alert('Save failed: ' + e.message);
  }
}

async function changeYear(y){
  YEAR = parseInt(y);
  history.replaceState(null, '', `facility.html?id=${FAC_ID}&year=${YEAR}`);
  try {
    const d = await api.getData(FAC_ID, YEAR);
    currentData = { ...(d.monthly_data || {}), catchment_pop: d.catchment_pop || 0, si_percent: d.si_percent != null ? d.si_percent : 3.2 };
  } catch(e) {
    currentData = {};
  }
  renderPage();
}

function exportCurrent(){
  const flat = { ...currentData };
  exportSingleFacility(facility, YEAR, flat);
}

init();
</script>
</body>
</html>
