<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>إدخال بيانات التطعيم</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark" style="background:#1FA2C8">
  <div class="container-fluid">
    <a href="index.html" class="btn btn-outline-light btn-sm me-2">
      <i class="bi bi-arrow-right"></i> رجوع
    </a>
    <span class="navbar-brand mb-0 fw-bold" id="navTitle">نظام متابعة التطعيم</span>
    <div class="ms-auto d-flex gap-2">
      <button class="btn btn-success btn-sm" onclick="exportCurrent()">
        <i class="bi bi-file-earmark-excel"></i> تصدير Excel
      </button>
      <button class="btn btn-light btn-sm" onclick="saveData()">
        <i class="bi bi-save2-fill"></i> حفظ
      </button>
    </div>
  </div>
</nav>

<div class="container-fluid py-3" id="pageContent">
  <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
</div>

<div id="savedToast" class="position-fixed bottom-0 start-50 translate-middle-x mb-3" style="z-index:9999;display:none">
  <div class="alert alert-success shadow py-2 px-4 mb-0">
    <i class="bi bi-check-circle-fill"></i> تم الحفظ بنجاح
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="js/data.js"></script>
<script src="js/export.js"></script>
<script>
const PARAMS = new URLSearchParams(location.search);
const FAC_ID = parseInt(PARAMS.get('id'));
let YEAR    = parseInt(PARAMS.get('year')) || 2025;
let facility = null;
let currentData = {};

async function init() {
  const stored = localStorage.getItem('facilities');
  let facilities;
  if (stored) {
    facilities = JSON.parse(stored);
  } else {
    const res = await fetch('data/facilities.json');
    facilities = await res.json();
    localStorage.setItem('facilities', JSON.stringify(facilities));
  }
  facility = facilities.find(f => f.id === FAC_ID);
  if (!facility) { document.getElementById('pageContent').innerHTML = '<div class="alert alert-danger">مؤسسة غير موجودة</div>'; return; }

  document.title = facility.name;
  document.getElementById('navTitle').textContent = facility.name;

  const saved = localStorage.getItem(`data_${FAC_ID}_${YEAR}`);
  currentData = saved ? JSON.parse(saved) : {};

  renderPage();
}

function renderPage() {
  const catchment = currentData.catchment_pop || 0;
  const si        = currentData.si_percent != null ? currentData.si_percent : 3.2;
  const target    = Math.round(catchment * si / 100);

  let html = `
  <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
    <div>
      <h5 class="mb-0"><i class="bi bi-hospital-fill text-primary"></i> ${facility.name}</h5>
      <small class="text-muted">${facility.governorate} | ${facility.type} | ${facility.provider}</small>
    </div>
  </div>

  <!-- Year & Target Population -->
  <div class="card mb-3 shadow-sm">
    <div class="card-header section-header">
      <i class="bi bi-people-fill"></i> السنة والسكان المستهدفون
    </div>
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-6 col-md-2">
          <label class="form-label fw-bold">السنة</label>
          <select id="yearSel" class="form-select" onchange="changeYear(this.value)">
            ${Array.from({length:13},(_,i)=>2020+i).map(y=>`<option value="${y}"${y===YEAR?' selected':''}>${y}</option>`).join('')}
          </select>
        </div>
        <div class="col-6 col-md-3">
          <label class="form-label fw-bold">إجمالي السكان (Catchment)</label>
          <input type="number" id="catchPop" class="form-control" value="${catchment}" min="0" oninput="recalcTarget()">
        </div>
        <div class="col-6 col-md-2">
          <label class="form-label fw-bold">% الرضّع الناجين (SI%)</label>
          <input type="number" id="siPct" class="form-control" value="${si}" step="0.1" min="0" max="100" oninput="recalcTarget()">
        </div>
        <div class="col-6 col-md-2">
          <label class="form-label fw-bold">الهدف (أقل من سنة)</label>
          <div class="form-control bg-light fw-bold text-primary" id="targetDisp">${target.toLocaleString()}</div>
        </div>
        <div class="col-md-3">
          <button class="btn btn-primary w-100" onclick="saveData()">
            <i class="bi bi-save2-fill"></i> حفظ البيانات
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Monthly Table -->
  <div class="card shadow-sm mb-3">
    <div class="card-header section-header d-flex justify-content-between align-items-center">
      <span><i class="bi bi-table"></i> البيانات الشهرية – الجرعات المعطاة</span>
      <small class="text-white opacity-75">الخلايا البيضاء = إدخال | الرمادية = محسوبة</small>
    </div>
    <div class="table-responsive">
      <table class="table table-bordered table-sm mb-0 monthly-table" id="mainTable">
        <thead>
          <tr class="table-header-row">
            <th rowspan="2" class="antigen-col">اللقاح</th>
            ${MONTHS.map(m=>`<th colspan="2" class="text-center month-header">${m}</th>`).join('')}
            <th rowspan="2" class="text-center annual-col">السنوي</th>
            <th rowspan="2" class="text-center cov-col">التغطية%</th>
          </tr>
          <tr class="table-subheader-row">
            ${MONTHS.map(()=>'<th class="text-center subh">الشهر</th><th class="text-center subh">تراكمي</th>').join('')}
          </tr>
        </thead>
        <tbody>
          ${ANTIGENS.map((ag,i) => {
            const rowCls = i%2===0?'row-blue':'row-yellow';
            let cells = '';
            for(let m=1;m<=12;m++){
              const v = currentData[`${ag.key}_${m}`]||0;
              cells += `<td><input type="number" class="form-control form-control-sm monthly-input text-center p-1"
                data-ag="${ag.key}" data-m="${m}" value="${v}" min="0" oninput="recalcAll()"></td>
                <td class="cum-cell text-center fw-semibold" id="cum_${ag.key}_${m}">0</td>`;
            }
            return `<tr class="${rowCls}" data-ag="${ag.key}">
              <td class="antigen-label fw-semibold">${ag.label}</td>
              ${cells}
              <td class="text-center fw-bold annual-cell" id="ann_${ag.key}">0</td>
              <td class="text-center cov-cell" id="cov_${ag.key}">–</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>

  <!-- Drop-out Table -->
  <div class="card shadow-sm mb-3">
    <div class="card-header section-header">
      <i class="bi bi-graph-down-arrow"></i> معدلات التسرب
      <small class="text-white opacity-75 me-3">معادلة: (جرعة أولى − جرعة أخيرة) ÷ جرعة أولى × 100</small>
    </div>
    <div class="table-responsive">
      <table class="table table-bordered table-sm mb-0">
        <thead>
          <tr class="table-header-row">
            <th class="antigen-col">المؤشر</th>
            ${MONTHS.map(m=>`<th class="text-center">${m}</th>`).join('')}
            <th class="text-center">السنوي</th>
            <th class="text-center">التقييم</th>
          </tr>
        </thead>
        <tbody id="dropoutBody">
          ${DROPOUTS.map((d,i)=>`
          <tr class="${i%2===0?'row-blue':'row-yellow'}" data-num="${d.num}" data-den="${d.den}">
            <td class="antigen-label fw-semibold">${d.label}</td>
            ${MONTHS.map((_,mi)=>`<td class="text-center" id="do_${i}_${mi+1}">–</td>`).join('')}
            <td class="text-center fw-bold" id="do_ann_${i}">–</td>
            <td class="text-center" id="do_st_${i}">–</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>

  <!-- Legend -->
  <div class="card shadow-sm mb-4">
    <div class="card-header section-header"><i class="bi bi-bar-chart-fill"></i> مفتاح مستوى التغطية</div>
    <div class="card-body d-flex gap-2 flex-wrap">
      <span class="legend-badge" style="background:#00B050;color:#fff">≥ 100% ممتاز</span>
      <span class="legend-badge" style="background:#92D050">≥ 75% جيد</span>
      <span class="legend-badge" style="background:#FFEB84">≥ 50% مقبول</span>
      <span class="legend-badge" style="background:#FF9900;color:#fff">≥ 45% ضعيف</span>
      <span class="legend-badge" style="background:#FF0000;color:#fff">&lt; 45% حرج</span>
    </div>
  </div>`;

  document.getElementById('pageContent').innerHTML = html;
  recalcAll();
}

function recalcTarget() {
  const c = parseFloat(document.getElementById('catchPop').value)||0;
  const s = parseFloat(document.getElementById('siPct').value)||0;
  document.getElementById('targetDisp').textContent = Math.round(c*s/100).toLocaleString();
  recalcAll();
}

function getTarget() {
  const c = parseFloat(document.getElementById('catchPop').value)||0;
  const s = parseFloat(document.getElementById('siPct').value)||0;
  return Math.round(c*s/100);
}

function recalcAll() {
  const monthly = {};
  const cumByMonth = {};
  const annuals = {};

  document.querySelectorAll('.monthly-input').forEach(inp => {
    const ag = inp.dataset.ag, m = parseInt(inp.dataset.m);
    if (!monthly[ag]) monthly[ag] = {};
    monthly[ag][m] = parseInt(inp.value)||0;
  });

  const target = getTarget();

  ANTIGENS.forEach(ag => {
    let cum = 0;
    cumByMonth[ag.key] = {};
    for (let m=1;m<=12;m++) {
      cum += (monthly[ag.key]&&monthly[ag.key][m])||0;
      cumByMonth[ag.key][m] = cum;
      const el = document.getElementById(`cum_${ag.key}_${m}`);
      if (el) el.textContent = cum.toLocaleString();
    }
    annuals[ag.key] = cum;
    const annEl = document.getElementById(`ann_${ag.key}`);
    if (annEl) annEl.textContent = cum.toLocaleString();

    const covEl = document.getElementById(`cov_${ag.key}`);
    if (covEl && target > 0) {
      const pct = (cum/target*100).toFixed(1);
      covEl.textContent = pct+'%';
      covEl.className = 'text-center cov-cell '+covClass(parseFloat(pct));
    } else if (covEl) {
      covEl.textContent = '–';
    }
  });

  DROPOUTS.forEach((d,i) => {
    for (let m=1;m<=12;m++) {
      const n = (cumByMonth[d.num]&&cumByMonth[d.num][m])||0;
      const dn = (cumByMonth[d.den]&&cumByMonth[d.den][m])||0;
      const el = document.getElementById(`do_${i}_${m}`);
      if (el) {
        if (n>0) { const p=((n-dn)/n*100).toFixed(1); el.textContent=p+'%'; el.className='text-center '+doClass(parseFloat(p)); }
        else el.textContent='–';
      }
    }
    const nA = annuals[d.num]||0, dA = annuals[d.den]||0;
    const annEl = document.getElementById(`do_ann_${i}`);
    const stEl  = document.getElementById(`do_st_${i}`);
    if (annEl) {
      if (nA>0) {
        const p=((nA-dA)/nA*100).toFixed(1);
        annEl.textContent=p+'%';
        annEl.className='text-center fw-bold '+doClass(parseFloat(p));
        if(stEl){stEl.textContent=parseFloat(p)>10?'⚠ مرتفع':'✓ مقبول'; stEl.className='text-center fw-bold '+(parseFloat(p)>10?'text-danger':'text-success');}
      } else { annEl.textContent='–'; if(stEl)stEl.textContent='–'; }
    }
  });
}

function covClass(p) {
  if(p>=100) return 'cov-excellent';
  if(p>=75)  return 'cov-good';
  if(p>=50)  return 'cov-fair';
  if(p>=45)  return 'cov-weak';
  return 'cov-critical';
}
function doClass(p) { return p>10?'text-danger':p>5?'text-warning':'text-success'; }

function saveData() {
  const obj = {
    catchment_pop: parseFloat(document.getElementById('catchPop').value)||0,
    si_percent:    parseFloat(document.getElementById('siPct').value)||3.2
  };
  document.querySelectorAll('.monthly-input').forEach(inp => {
    obj[`${inp.dataset.ag}_${inp.dataset.m}`] = parseInt(inp.value)||0;
  });
  localStorage.setItem(`data_${FAC_ID}_${YEAR}`, JSON.stringify(obj));
  currentData = obj;
  const t = document.getElementById('savedToast');
  t.style.display='block';
  setTimeout(()=>t.style.display='none', 2500);
}

function changeYear(y) {
  YEAR = parseInt(y);
  history.replaceState(null,'',`facility.html?id=${FAC_ID}&year=${YEAR}`);
  const saved = localStorage.getItem(`data_${FAC_ID}_${YEAR}`);
  currentData = saved ? JSON.parse(saved) : {};
  renderPage();
}

function exportCurrent() {
  exportSingleFacility(facility, YEAR);
}

init();
</script>
</body>
</html>
